name: release
on:
  push:
    # Used for testing release infrastructure from a specific branch.
    branches:
      - test_release
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    workflow_dispatch:
jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create artifacts directory
        run: mkdir artifacts

      - name: Determine git-cliff arguments
        id: cliff_args
        run: |
          if [ "${{ github.ref_name }}" = "test_release" ]; then
            echo "args=--unreleased --bump --no-exec --strip header" >> $GITHUB_OUTPUT
          else
            echo "args=--latest --no-exec --strip header" >> $GITHUB_OUTPUT
          fi

      - name: "Build Changelog"
        id: build_changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.cliff_args.outputs.args }}
        env:
          OUTPUT: GITHUB_RELEASE_CHANGELOG.md

      - name: Determine release tag name
        id: tag_name
        run: |
          if [ "${{ github.ref_name }}" = "test_release" ]; then
            echo "tag=test_release_tag" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          prerelease: ${{ github.ref_type == 'branch' }}
          draft: ${{ github.ref_type == 'tag' }}
          body: ${{ steps.build_changelog.outputs.content }}

      - name: Save release upload URL to artifact
        run: echo "${{ steps.release.outputs.upload_url }}" > artifacts/release-upload-url

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: artifacts
          path: artifacts

  sbom:
    name: Generate SBOMs
    needs: ['create-release']
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: dyndns-sbom.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: false
          output-file: dyndns-sbom.spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: dyndns-sbom.cdx.json
          format: cyclonedx-json
          upload-artifact: true
          upload-release-assets: false
          output-file: dyndns-sbom.cdx.json

      - name: Attest SPDX SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dyndns-sbom.spdx.json

      - name: Attest CycloneDX SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dyndns-sbom.cdx.json

      - name: Get release upload URL
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: artifacts
          path: artifacts

      - name: Set release upload URL
        run: |
          release_upload_url="$(cat artifacts/release-upload-url)"
          echo "RELEASE_UPLOAD_URL=$release_upload_url" >> $GITHUB_ENV

      - name: Upload SPDX SBOM to release
        uses: shogo82148/actions-upload-release-asset@96bc1f0cb850b65efd58a6b5eaa0a69f88d38077 # v1
        with:
          upload_url: ${{ env.RELEASE_UPLOAD_URL }}
          asset_path: dyndns-sbom.spdx.json
          asset_name: dyndns-sbom.spdx.json
          asset_content_type: application/json

      - name: Upload CycloneDX SBOM to release
        uses: shogo82148/actions-upload-release-asset@96bc1f0cb850b65efd58a6b5eaa0a69f88d38077 # v1
        with:
          upload_url: ${{ env.RELEASE_UPLOAD_URL }}
          asset_path: dyndns-sbom.cdx.json
          asset_name: dyndns-sbom.cdx.json
          asset_content_type: application/json

  build-release:
    name: Build release
    needs: ['create-release', 'sbom']
    permissions:
      id-token: write
      contents: read
      attestations: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux_x64, linux_armv7, linux_aarch64, mac_x64, mac_arm64]
        include:
          - build: linux_x64
            # building x86_64-unknown-linux-musl fails with not finding musl-gcc
            rust_target_arch: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - build: linux_armv7
            rust_target_arch: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            cross: true
          - build: linux_aarch64
            rust_target_arch: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - build: mac_x64
            rust_target_arch: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - build: mac_arm64
            rust_target_arch: aarch64-apple-darwin
            os: macos-15
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        if: matrix.cross == true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-registry-v2-${{ hashFiles(''**/Cargo.lock'') }}'

      - name: Cache target folder
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        if: matrix.cross == true
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-builds-${{ matrix.build }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target_arch }}

      - name: Use smart rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: matrix.cross == false
        with:
          key: ${{ matrix.build }}

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: 'webclients/svelte/package-lock.json'

      - name: Install node packages
        run: npm ci
        working-directory: webclients/svelte

      - name: Build web app
        run: npm run build
        working-directory: webclients/svelte

      - name: Build with cargo
        run: cargo build --release --target=${{ matrix.rust_target_arch }} --features web
        if: matrix.cross == false

      - name: Build with cross
        run: cross build --release --target=${{ matrix.rust_target_arch }} --features web
        if: matrix.cross == true

      - name: Get release download URL
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: artifacts
          path: artifacts

      - name: Download SPDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dyndns-sbom.spdx.json
          path: sbom

      - name: Set release upload URL and release version
        shell: bash
        run: |
          release_upload_url="$(cat artifacts/release-upload-url)"
          # Only available in next step
          echo "RELEASE_UPLOAD_URL=$release_upload_url" >> $GITHUB_ENV
          echo "release upload url: $release_upload_url"

      - name: Create staging archive
        id: create_staging_archive
        uses: ./.github/actions/create_archive
        with:
          rust_target_arch: ${{ matrix.rust_target_arch }}

      - name: Upload release archive
        uses: shogo82148/actions-upload-release-asset@96bc1f0cb850b65efd58a6b5eaa0a69f88d38077 # v1
        with:
          upload_url: ${{ env.RELEASE_UPLOAD_URL }}
          asset_path: ${{ steps.create_staging_archive.outputs.archive_name }}
          asset_name: ${{ steps.create_staging_archive.outputs.archive_name }}
          asset_content_type: application/octet-stream

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.create_staging_archive.outputs.archive_name }}

      - name: Generate SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.create_staging_archive.outputs.archive_name }}
          sbom-path: sbom/dyndns-sbom.spdx.json
