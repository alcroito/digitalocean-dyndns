# Further CI inspiration
# https://gist.github.com/PurpleBooth/84b3d7d6669f77d5a53801a258ed269a
# https://github.com/qt-creator/qt-creator/blob/master/.github/workflows/build_cmake.yml

name: ci
on:
  push:
    branches:
      - 'master'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      rust: ${{ steps.changes.outputs.rust }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed paths
        # Skip path filtering for tag pushes and manual dispatches — always run everything
        if: github.event_name == 'pull_request' || github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            web:
              - 'webclients/**'
              - '.github/workflows/ci.yaml'
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'diesel.toml'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yaml'

      - name: Determine change flags
        id: changes
        run: |
          # When paths-filter was skipped (tag push, workflow_dispatch), default to true
          if [[ -z "${{ steps.filter.outputs.rust }}" ]]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=${{ steps.filter.outputs.rust }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
          fi

      # Full matrix when rust files changed, only one main platform otherwise
      - name: Determine build matrix
        id: matrix
        run: |
          builds=("linux_x64_stats")
          if [[ "${{ steps.changes.outputs.rust }}" == "true" ]]; then
            builds+=(
              "linux_x64"
              "linux_x64_web"
              "linux_armv7"
              "linux_aarch64"
              "linux_aarch64_stats"
              "linux_aarch64_web"
              "mac_x64"
              "mac_x64_stats"
              "mac_x64_web"
              "mac_arm64_web"
            )
          fi
          # Convert bash array to JSON array, e.g. ["linux_x64_stats", "linux_x64", ...]
          json=$(printf '%s\n' "${builds[@]}" | jq --raw-input . | jq --slurp --compact-output .)
          echo "build_matrix=${json}" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - default
          - no_features
          - stats
          - web
          - web_debug
          - web_debug_static_embedded
          - all_features
        include:
          - build: default
            features: ""
            no_default_features: false
            all_features: false
            release: true
          - build: no_features
            features: ""
            no_default_features: true
            all_features: false
            release: true
          - build: stats
            features: stats
            no_default_features: true
            all_features: false
            release: true
          - build: web
            features: web
            no_default_features: true
            all_features: false
            release: true
          - build: web_debug
            features: web
            no_default_features: true
            all_features: false
            release: false
          - build: web_debug_static_embedded
            features: debug_static_embedded
            no_default_features: true
            all_features: false
            release: true
          - build: all_features
            features: ""
            no_default_features: false
            all_features: true
            release: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-registry-v2-${{ hashFiles(''**/Cargo.lock'') }}'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-checks-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Create dummy web artifacts
        run: mkdir -p webclients/svelte/build

      - name: Run cargo check
        run: cargo check ${{ matrix.features && '--features' }} ${{ matrix.features }} ${{ matrix.release && '--release' || '' }} ${{ matrix.no_default_features && '--no-default-features' || '' }} ${{ matrix.all_features && '--all-features' || '' }}

  test:
    name: Test Suite
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - default
          - no_features
          - stats
          - web
          - web_debug
          - web_debug_static_embedded
          - all_features
        include:
          - build: default
            features: ""
            no_default_features: false
            all_features: false
            release: true
          - build: no_features
            features: ""
            no_default_features: true
            all_features: false
            release: true
          - build: stats
            features: stats
            no_default_features: true
            all_features: false
            release: true
          - build: web
            features: web
            no_default_features: true
            all_features: false
            release: true
          - build: web_debug
            features: web
            no_default_features: true
            all_features: false
            release: false
          - build: web_debug_static_embedded
            features: debug_static_embedded
            no_default_features: true
            all_features: false
            release: true
          - build: all_features
            features: ""
            no_default_features: false
            all_features: true
            release: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-registry-v2-${{ hashFiles(''**/Cargo.lock'') }}'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Create dummy web artifacts
        run: mkdir -p webclients/svelte/build

      - name: Install latest nextest release
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2
        with:
          tool: cargo-nextest

      - name: Run cargo nextest
        run: cargo nextest run --profile ci ${{ matrix.features && '--features' }} ${{ matrix.features }} ${{ matrix.release && '--release' || '' }} ${{ matrix.no_default_features && '--no-default-features' || '' }} ${{ matrix.all_features && '--all-features' || '' }}
        env:
          RUST_BACKTRACE: full

      - name: Setup tmate session
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3

  lints:
    name: Lints
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - default
          - no_features
          - stats
          - web
          - web_debug
          - web_debug_static_embedded
          - all_features
        include:
          - build: default
            features: ""
            no_default_features: false
            all_features: false
            release: true
          - build: no_features
            features: ""
            no_default_features: true
            all_features: false
            release: true
          - build: stats
            features: stats
            no_default_features: true
            all_features: false
            release: true
          - build: web
            features: web
            no_default_features: true
            all_features: false
            release: true
          - build: web_debug
            features: web
            no_default_features: true
            all_features: false
            release: false
          - build: web_debug_static_embedded
            features: debug_static_embedded
            no_default_features: true
            all_features: false
            release: true
          - build: all_features
            features: ""
            no_default_features: false
            all_features: true
            release: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-registry-v2-${{ hashFiles(''**/Cargo.lock'') }}'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-checks-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Create dummy web artifacts
        run: mkdir -p webclients/svelte/build

      - name: Run cargo fmt
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run cargo clippy
        run: cargo clippy ${{ matrix.features && '--features' }} ${{ matrix.features }} ${{ matrix.release && '--release' || '' }} ${{ matrix.no_default_features && '--no-default-features' || '' }} ${{ matrix.all_features && '--all-features' || '' }} -- -D warnings

  web_check:
    name: Web Check
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: 'webclients/svelte/package-lock.json'

      - name: Install node packages
        run: npm ci
        working-directory: webclients/svelte

      - name: Run npm check
        run: npm run check
        working-directory: webclients/svelte

  web_lints:
    name: Web Lints
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: 'webclients/svelte/package-lock.json'

      - name: Install node packages
        run: npm ci
        working-directory: webclients/svelte

      - name: Run prettier and eslint
        run: npm run lint
        working-directory: webclients/svelte


  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: dyndns-sbom.spdx.json
          format: spdx-json
          upload-artifact: true
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: dyndns-sbom.cdx.json
          format: cyclonedx-json
          upload-artifact: true
          upload-release-assets: false

  build:
    needs:
      - changes
      - check
      - test
      - lints
      - web_check
      - web_lints
    # Run even when rust/web jobs are skipped (no changes), but still block if any dependency failed or was cancelled
    if: always() && !failure() && !cancelled()
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJSON(needs.changes.outputs.build_matrix) }}
        include:
          - build: linux_x64
            # building x86_64-unknown-linux-musl fails with not finding musl-gcc
            rust_target_arch: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            features: ""
          - build: linux_x64_stats
            # building x86_64-unknown-linux-musl fails with not finding musl-gcc
            rust_target_arch: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            features: stats
          - build: linux_x64_web
            # building x86_64-unknown-linux-musl fails with not finding musl-gcc
            rust_target_arch: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            features: web
          - build: linux_armv7
            rust_target_arch: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            cross: true
            features: ""
          - build: linux_aarch64
            rust_target_arch: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            features: ""
          - build: linux_aarch64_stats
            rust_target_arch: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            features: stats
          - build: linux_aarch64_web
            rust_target_arch: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            features: web
          - build: mac_x64
            rust_target_arch: x86_64-apple-darwin
            os: macos-latest
            cross: false
            features: ""
          - build: mac_x64_stats
            rust_target_arch: x86_64-apple-darwin
            os: macos-latest
            cross: false
            features: stats
          - build: mac_x64_web
            rust_target_arch: x86_64-apple-darwin
            os: macos-latest
            cross: false
            features: web
          - build: mac_arm64_web
            rust_target_arch: aarch64-apple-darwin
            os: macos-15
            cross: false
            features: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        if: matrix.cross == true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-registry-v2-${{ hashFiles(''**/Cargo.lock'') }}'

      - name: Cache target folder
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        if: matrix.cross == true
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-builds-${{ matrix.build }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.rust_target_arch }}

      - name: Use smart rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: matrix.cross == false
        with:
          key: ${{ matrix.build }}

      - name: Show project dependency graph
        run: cargo tree

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: matrix.features == 'web'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: 'webclients/svelte/package-lock.json'

      - name: Install node packages
        run: npm ci
        working-directory: webclients/svelte
        if: matrix.features == 'web'

      - name: Generate types from the rust generated openapi schema
        run: npm run apigen
        working-directory: webclients/svelte
        if: matrix.features == 'web'

      - name: Build web app
        run: npm run build
        working-directory: webclients/svelte
        if: matrix.features == 'web'

      - name: Create dummy web artifacts
        run: mkdir -p webclients/svelte/build
        if: matrix.features != 'web'

      - name: Build with cargo
        run: cargo build --release --target=${{ matrix.rust_target_arch }} ${{ matrix.features && '--features' }} ${{ matrix.features }} --no-default-features
        if: matrix.cross == false

      - name: Build with cross
        run: cross build --release --target=${{ matrix.rust_target_arch }} ${{ matrix.features && '--features' }} ${{ matrix.features }} --no-default-features
        if: matrix.cross == true

      - name: Run app with --build-info
        run: cargo run --release --target=${{ matrix.rust_target_arch }} ${{ matrix.features && '--features' }} ${{ matrix.features }} --no-default-features -- --build-info
        if: matrix.cross == false

      - name: Create staging archive
        id: create_staging_archive
        uses: ./.github/actions/create_archive
        with:
          rust_target_arch: ${{ matrix.rust_target_arch }}
          archive_suffix: "-${{ github.run_id }}"

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ env.RELEASE_VERSION }}-${{ matrix.rust_target_arch }}-feat-${{ matrix.build }}-${{ github.run_id }}.tar.gz
          path: ${{ steps.create_staging_archive.outputs.archive_name }}
